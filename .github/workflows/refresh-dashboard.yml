name: Refresh Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refresh GitHub metadata in dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh_dashboard_from_github.py

      - name: Commit and push refreshed dashboard
        run: |
          if git diff --quiet; then
            echo "No dashboard changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lipi/lipi-checks-dashboard.html
          git commit -m "Refresh dashboard GitHub metadata"
          git push
